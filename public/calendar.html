<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="bjevHpP5Qc-g1TjDo6F0PUbD0nyB646EqcNfrxjrxjs" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paralake City | Map Rotation</title>
    <link rel="icon" type="image/x-icon" href="images_excluded/archive_icon_mono.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Sono:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Jost:ital@0;1&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" type="text/css" href="css/styles.css">
    <link rel="stylesheet" type="text/css" href="css/calendar.css">
</head>
<body>
    <div id="mobile-warning">
        <div class="mobile-warning-content">
            <p>This site is not designed to work on mobile devices.</p>
            <button onclick="closeMobileWarning()">Okay</button>
        </div>
    </div>
    
    <div id="header">
        <span id="header-title" style="line-height: 0.8; cursor: pointer;" onclick="location.href='index.html'">Paralake City</span>
        
        <div id="header-nav">
            <button class="menu-button" onclick="location.href='archive.html'">Development Archive</button>
            <button class="menu-button" onclick="location.href='changelogs.html'">Changelogs</button>
            <button class="menu-button" onclick="location.href='downloads.html'">Downloads</button>
            <button class="menu-button" onclick="location.href='credits.html'">Map Credits</button>
            <button class="menu-button-calendar-selected" onclick="location.href='#'">Map Rotation Calendar</button>
            <button class="menu-button-map" onclick="location.href='map.html'">Interactive Map</button>
            <!-- <button id="theme-toggle">Dark Theme</button> -->
        </div>
    </div>

    <div id="container">
        <div id="sidebar">
            <div class="calendar-controls">
                <h2 id="monthTitle">Month Year</h2>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn">Prev</button>
                    <button class="nav-btn" id="nextBtn">Next</button>
                </div>
            </div>

            <div class="legend">
                <h3>Map Rotation</h3>
                <div class="legend-item"><span class="dot" style="background: var(--color-normal)"></span> Day</div>
                <div class="legend-item"><span class="dot" style="background: var(--color-night)"></span> Night</div>
                <div class="legend-item"><span class="dot" style="background: var(--color-winter)"></span> Winter</div>
            </div>
            
            <div class="info-text">
                <p style="font-weight: 600; font-size: 1.4rem;">The map rotation schedule for the PERPHeads server</p>
                <p>The map changes at server restart</p>
                <p>(7:00 AM GMT)</p>
            </div>
        </div>

        <div id="calendar-main">
            <div class="weekdays">
                <div>Sunday</div><div>Monday</div><div>Tuesday</div><div>Wednesday</div><div>Thursday</div><div>Friday</div><div>Saturday</div>
            </div>
            <div class="days-grid" id="daysGrid"></div>
        </div>
    </div>

    <div id="pagefooter" style="position: sticky; z-index: 9999;"></div>

    <script>
        // calendar logic
        let currentDisplayDate = new Date();

        const NIGHT_DAYS = [
            { m: 9, d: 31 },  // Oct 31
            { m: 10, d: 1 },  // Nov 1
            { m: 11, d: 31 }, // Dec 31
            { m: 0, d: 1 }    // Jan 1
        ];

        function getMapForDate(date) {
            const month = date.getMonth(); // 0-indexed
            const day = date.getDate();

            const isHolidayNight = NIGHT_DAYS.some(h => h.m === month && h.d === day);
            if (isHolidayNight) return 'map-night';


            if (month === 11) return 'map-winter';

            const gmtTimestampMs = Date.UTC(date.getFullYear(), month, day, 7, 0, 0);
            const daysSinceEpoch = Math.floor(gmtTimestampMs / 1000 / 86400);

            if (daysSinceEpoch % 5 < 4) {
                return 'map-normal';
            }
            return 'map-night';
        }

        function renderCalendar() {
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();

            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('monthTitle').innerText = `${monthNames[month]} ${year}`;

            const grid = document.getElementById('daysGrid');
            grid.innerHTML = '';

            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell empty';
                grid.appendChild(emptyCell);
            }

            for (let day = 1; day <= totalDays; day++) {
                const cellDate = new Date(year, month, day);
                
                // no dates before may 24th 2026
                if (year < 2026 || (year === 2026 && month < 4) || (year === 2026 && month === 4 && day < 24)) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'day-cell empty';
                    grid.appendChild(emptyCell);
                    continue;
                }

                const mapClass = getMapForDate(cellDate);

                const cell = document.createElement('div');
                cell.className = `day-cell ${mapClass}`;
                
                let label = "Day";
                let iconHtml = "";
                if(mapClass === "map-night") {
                    label = "Night";
                    iconHtml = `<img src="images_excluded/icon_night.png" class="day-icon" alt="Night">`;
                }
                if(mapClass === "map-winter") {
                    label = "Winter";
                    iconHtml = `<img src="images_excluded/icon_winter.png" class="day-icon" alt="Winter">`;
                }

                cell.innerHTML = `
                    <span class="day-number">${day}</span>
                    ${iconHtml}
                    <span class="day-label">${label}</span>
                `;
                grid.appendChild(cell);
            }
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            const currentMonth = currentDisplayDate.getMonth();
            const currentYear = currentDisplayDate.getFullYear();
            if (currentYear === 2026 && currentMonth === 4) return;
            
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() - 1);
            renderCalendar();
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + 1);
            renderCalendar();
        });

        // Initialize
        renderCalendar();
    </script>

    <script src="scripts/mobileWarning.js"></script>
    <script src="scripts/footer.js"></script>
    <script src="scripts/headerMenu.js"></script>
</body>
</html>
