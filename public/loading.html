<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images_excluded/archive_icon_mono.png">
    <title>Now In Development... - Paralake City</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sono:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Jost:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           1. PROPERTIES & VARIABLES
           ========================================== */
        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @property --text-angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        :root {
            --color-bg: #0a0a0a;
            --color-text: #ffffff;
            --color-accent: #f3b447;
            --color-accent-hover: #ffc56b;
            --color-border-hover: rgba(255, 255, 255, 0.15);
            
            --grad-color-1: #bd71db;
            --grad-color-2: #a0a0a0;
            --grad-color-3: #9476ac;
            
            --font-body: 'Funnel Sans', sans-serif;
            --font-secondary: 'Jost', sans-serif;
        }

        /* ==========================================
           2. RESET & BASE
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100vh;
            background-color: var(--color-bg);
            color: var(--color-text);
            overflow: hidden;
            font-family: var(--font-body);
        }

        /* ==========================================
           3. BACKGROUND & LAYOUT
           ========================================== */
        body {
            animation: spin-dots 10s linear infinite;
            background-image: 
                radial-gradient(ellipse at top, transparent 0%, var(--color-bg) 85%),
                radial-gradient(circle, transparent 1px, var(--color-bg) 2.5px),
                conic-gradient(from var(--angle), 
                    var(--grad-color-1), 
                    var(--grad-color-2), 
                    var(--grad-color-3), 
                    var(--grad-color-1)
                );
            background-size: 100% 100%, 20px 20px, 100% 100%;
            background-position: center top, center center, center center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ==========================================
           4. ANIMATIONS
           ========================================== */
        @keyframes spin-dots {
            to { --angle: 360deg; }
        }

        @keyframes spin-text-gradient {
            to { --text-angle: 360deg; }
        }

        /* ==========================================
           5. CAD SVG & LOGO STYLES
           ========================================== */
        #cad-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 90vmin;
            height: 90vmin;
            max-width: 1060px;
            max-height: 1000px;
        }

        .construction-line {
            fill: none;
        }

        .main-path {
            fill: none;
            stroke-linejoin: miter;
            stroke-miterlimit: 10;
        }
        
        .node text {
            font-size: 14px;
            font-family: monospace; /* Keeps the coordinate text looking technical */
        }

        /* ==========================================
           6. HERO SECTION (Preserved from File 2)
           ========================================== */
        #container {
            display: flex;
            flex-direction: column;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            font-size: 18px;
            align-items: center;
        }

        .hero-section {
            width: 100%;
            max-width: 1024px;
            border-radius: 12px;
            background: linear-gradient(rgba(10, 10, 10, 0.85), rgba(10, 10, 10, 0.95));
            border: 1px solid var(--color-border-hover);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            text-align: center;
            padding: 60px 40px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        .hero-content {
            color: #fff;
        }

        .hero-title {
            font-family: var(--font-secondary);
            font-size: 3em;
            margin: 0 0 10px 0;
            font-weight: 700;
            animation: spin-text-gradient 20s linear infinite;
            background: linear-gradient(
                var(--text-angle), 
                #9c9c9c, 
                #e4e4e4, 
                #727272, 
                #9c9c9c
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0px 20px rgba(255, 255, 255, 0.1);
        }

        .hero-subtitle {
            font-size: 1.2em;
            margin: 0 0 10px 0;
            opacity: 0.9;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
        }

        .redirect-note {
            font-size: 0.9em;
            opacity: 0.6;
            margin-bottom: 35px;
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-btn {
            padding: 14px 28px;
            border-radius: 6px;
            font-family: var(--font-secondary);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            text-decoration: none;
        }

        .hero-btn.primary {
            background: var(--color-accent);
            color: #121212;
        }

        .hero-btn.primary:hover {
            background: var(--color-accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 180, 71, 0.4);
        }
    </style>
</head>
<body>

    <div id="cad-container">
        <svg viewBox="0 0 1060 1000" id="main-svg">
            <defs>
                <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                    <path d="M 20 0 L 0 0 0 20" fill="none" id="grid-path" stroke-width="1" />
                </pattern>
                
                <filter id="blur-glow">
                    <feGaussianBlur id="blur-amount" stdDeviation="40" />
                </filter>

                <filter id="final-glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="15" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                
                <mask id="glow-mask">
                    <rect width="100%" height="100%" fill="black" />
                    <g id="glow-mask-paths" filter="url(#blur-glow)"></g>
                </mask>

                <mask id="pixel-mask">
                    <rect width="100%" height="100%" fill="black" />
                    <g id="pixel-mask-rects"></g>
                </mask>
            </defs>

            <rect width="100%" height="100%" fill="url(#grid)" mask="url(#glow-mask)" id="grid-bg" />

            <g id="construction-layer"></g>
            <g id="nodes-layer"></g>

            <g id="logo-outlines"></g>

            <g id="logo-glow-wrapper" filter="url(#final-glow)">
                <g id="logo-glow" mask="url(#pixel-mask)"></g>
            </g>

            <g id="logo-fill" mask="url(#pixel-mask)" fill="#ffffff"></g>
        </svg>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // ==========================================
            // 🎛️ ANIMATION CONFIGURATION
            // ==========================================
            const CONFIG = {
                // TIMING (Start times in milliseconds)
                seq1Start: 200,    // Construction lines start
                seq2Start: 4000,   // Nodes start popping in
                seq3Start: 6000,   // Outlines & Grid Glow begin drawing
                seq4Start: 7000,   // Solid logo squares begin filling in
                
                // SPEEDS (1.0 = Default, Higher = Slower)
                seq1Speed: 5,      // Speed of construction lines drawing
                seq2Speed: 1.3,    // Speed of nodes appearing
                seq3Speed: 1.8,    // Speed of the main outline drawing
                seq4Speed: 3,      // Speed of the square-fill sweep
                
                // VISUALS
                lineColor: '#ffffff',        // Neon color of drafting lines
                gridColor: '#ffffff',        // Color of illuminated grid
                glowColor: '#E8F5FF',        // Color of the final logo aura/glow
                gridSize: 40,                // Size of background grid squares
                glowSpread: 40,              // Grid illumination spread
                fillSquareSize: 40,          // Size of the reveal squares
                outlineWidth: 3,             
                constructionOpacity: 0.5,
                gridMaxOpacity: 0.6,

                // FINAL CLEANUP
                glowFadeDelay: 2000          // Delay after cleanup starts before fading out the glow
            };

            // ==========================================
            // SYSTEM SETUP
            // ==========================================
            const ns = "http://www.w3.org/2000/svg";
            
            // Apply config to elements
            document.getElementById('grid-path').setAttribute('d', `M ${CONFIG.gridSize} 0 L 0 0 0 ${CONFIG.gridSize}`);
            document.getElementById('grid').setAttribute('width', CONFIG.gridSize);
            document.getElementById('grid').setAttribute('height', CONFIG.gridSize);
            document.getElementById('grid-path').setAttribute('stroke', CONFIG.gridColor);
            document.getElementById('blur-amount').setAttribute('stdDeviation', CONFIG.glowSpread);
            document.getElementById('grid-bg').style.opacity = CONFIG.gridMaxOpacity;
            
            // Set the custom color for the final glow layer
            document.getElementById('logo-glow').setAttribute('fill', CONFIG.glowColor);

            const vPoints = [[100, 250], [240, 250], [370, 575], [500, 250], [640, 250], [440, 750], [300, 750]];
            const sevenPoints = [[660, 250], [960, 250], [760, 750], [620, 750], [760, 400], [600, 400]];
            const shapes = [vPoints, sevenPoints];

            const constLayer = document.getElementById('construction-layer');
            const nodesLayer = document.getElementById('nodes-layer');
            const outlinesLayer = document.getElementById('logo-outlines');
            const fillLayer = document.getElementById('logo-fill');
            const glowFillLayer = document.getElementById('logo-glow');
            const glowMaskPaths = document.getElementById('glow-mask-paths');
            const pixelMaskRects = document.getElementById('pixel-mask-rects');

            function getPathString(points) {
                return "M " + points.map(p => p.join(",")).join(" L ") + " Z";
            }

            function animateDraw(element, length, durationMs, delayMs) {
                element.setAttribute("stroke-dasharray", length);
                element.setAttribute("stroke-dashoffset", length);
                return element.animate([
                    { strokeDashoffset: length },
                    { strokeDashoffset: 0 }
                ], { duration: durationMs, delay: delayMs, fill: 'forwards', easing: 'ease-in-out' });
            }

            // ==========================================
            // SEQUENCE 1: CONSTRUCTION LINES
            // ==========================================
            let lineDelay = CONFIG.seq1Start;
            shapes.forEach(points => {
                for(let i = 0; i < points.length; i++) {
                    const p1 = points[i];
                    const p2 = points[(i + 1) % points.length];
                    
                    const dx = p2[0] - p1[0];
                    const dy = p2[1] - p1[1];
                    const len = Math.sqrt(dx*dx + dy*dy);
                    if(len === 0) continue;

                    const ux = dx / len;
                    const uy = dy / len;
                    const ext = 800; 
                    
                    const line = document.createElementNS(ns, "line");
                    line.setAttribute("x1", p1[0] - ux * ext);
                    line.setAttribute("y1", p1[1] - uy * ext);
                    line.setAttribute("x2", p2[0] + ux * ext);
                    line.setAttribute("y2", p2[1] + uy * ext);
                    line.setAttribute("stroke", CONFIG.lineColor);
                    line.setAttribute("stroke-width", "1");
                    line.setAttribute("class", "construction-line");
                    line.style.opacity = "0";
                    constLayer.appendChild(line);

                    const totalExtLen = ext * 2 + len;
                    
                    line.animate([{ opacity: 0 }, { opacity: CONFIG.constructionOpacity }], {
                        duration: 100, delay: lineDelay, fill: 'forwards'
                    });
                    
                    animateDraw(line, totalExtLen, 1500 * CONFIG.seq1Speed, lineDelay);
                    lineDelay += 100 * CONFIG.seq1Speed;
                }
            });

            // ==========================================
            // SEQUENCE 2: NODES
            // ==========================================
            let nodeDelay = CONFIG.seq2Start;
            shapes.forEach(points => {
                points.forEach(point => {
                    const g = document.createElementNS(ns, "g");
                    g.setAttribute("class", "node");

                    const circle = document.createElementNS(ns, "circle");
                    circle.setAttribute("cx", point[0]);
                    circle.setAttribute("cy", point[1]);
                    circle.setAttribute("fill", "#000");
                    circle.setAttribute("stroke", CONFIG.lineColor);
                    circle.setAttribute("stroke-width", "2");
                    circle.style.opacity = "0";

                    const text = document.createElementNS(ns, "text");
                    text.setAttribute("x", point[0] + 10);
                    text.setAttribute("y", point[1] - 10);
                    text.setAttribute("fill", "#000");
                    text.style.opacity = "0";
                    text.textContent = `[${point[0]},${point[1]}]`;

                    g.appendChild(circle);
                    g.appendChild(text);
                    nodesLayer.appendChild(g);

                    circle.animate([
                        { r: 0, opacity: 0 },
                        { r: 6, opacity: 1, offset: 0.7 },
                        { r: 4, opacity: 1 }
                    ], {
                        duration: 600 * CONFIG.seq2Speed, delay: nodeDelay, fill: 'forwards', easing: 'cubic-bezier(0.175, 0.885, 0.32, 1.275)'
                    });

                    text.animate([{ opacity: 0 }, { opacity: 0.6 }], {
                        duration: 400 * CONFIG.seq2Speed, delay: nodeDelay + 200, fill: 'forwards'
                    });

                    nodeDelay += 80 * CONFIG.seq2Speed;
                });
            });

            // ==========================================
            // SEQUENCE 3: MAIN OUTLINES & GRID GLOW
            // ==========================================
            shapes.forEach(points => {
                const pathStr = getPathString(points);
                
                const path = document.createElementNS(ns, "path");
                path.setAttribute("d", pathStr);
                path.setAttribute("stroke", "white");
                path.setAttribute("stroke-width", CONFIG.outlineWidth);
                path.setAttribute("class", "main-path");
                outlinesLayer.appendChild(path);

                const glowPath = document.createElementNS(ns, "path");
                glowPath.setAttribute("d", pathStr);
                glowPath.setAttribute("stroke", "white");
                glowPath.setAttribute("stroke-width", CONFIG.glowSpread);
                glowPath.setAttribute("fill", "none");
                glowPath.setAttribute("stroke-linecap", "round");
                glowPath.setAttribute("stroke-linejoin", "round");
                glowMaskPaths.appendChild(glowPath);

                // Add paths to both the pure white layer and the colored glow layer
                const fillShape = document.createElementNS(ns, "path");
                fillShape.setAttribute("d", pathStr);
                fillLayer.appendChild(fillShape);

                const glowFillShape = document.createElementNS(ns, "path");
                glowFillShape.setAttribute("d", pathStr);
                glowFillLayer.appendChild(glowFillShape);

                const length = path.getTotalLength();
                const duration = 2500 * CONFIG.seq3Speed;

                animateDraw(path, length, duration, CONFIG.seq3Start);
                animateDraw(glowPath, length, duration, CONFIG.seq3Start);
            });

            // ==========================================
            // SEQUENCE 4: SQUARE-BY-SQUARE INFILL
            // ==========================================
            let maxPixelEndTime = 0;
            const startX = 80, endX = 980, startY = 230, endY = 770;

            for (let x = startX; x <= endX; x += CONFIG.fillSquareSize) {
                for (let y = startY; y <= endY; y += CONFIG.fillSquareSize) {
                    
                    const rect = document.createElementNS(ns, "rect");
                    rect.setAttribute("x", x);
                    rect.setAttribute("y", y);
                    rect.setAttribute("width", CONFIG.fillSquareSize + 1); 
                    rect.setAttribute("height", CONFIG.fillSquareSize + 1);
                    rect.setAttribute("fill", "white");
                    rect.style.opacity = "0";
                    pixelMaskRects.appendChild(rect);

                    const normalizedX = (x - startX) / (endX - startX);
                    const baseDelay = normalizedX * 1500 * CONFIG.seq4Speed;
                    const randomDelay = Math.random() * 800 * CONFIG.seq4Speed;
                    const finalDelay = CONFIG.seq4Start + baseDelay + randomDelay;
                    const fillDuration = 400 * CONFIG.seq4Speed;

                    rect.animate([ { opacity: 0 }, { opacity: 1 } ], {
                        duration: fillDuration, delay: finalDelay, fill: 'forwards'
                    });

                    if (finalDelay + fillDuration > maxPixelEndTime) {
                        maxPixelEndTime = finalDelay + fillDuration;
                    }
                }
            }

            // ==========================================
            // SEQUENCE 5: CLEANUP (FADES)
            // ==========================================
            const cleanupTime = maxPixelEndTime - 1500; 
            const fadeDuration = 2000;

            document.getElementById('grid-bg').animate([
                { opacity: CONFIG.gridMaxOpacity }, { opacity: 0 }
            ], { duration: fadeDuration, delay: cleanupTime, fill: 'forwards', easing: 'ease-in-out' });

            constLayer.animate([{ opacity: 1 }, { opacity: 0 }], { duration: fadeDuration, delay: cleanupTime - 1000, fill: 'forwards' });
            nodesLayer.animate([{ opacity: 1 }, { opacity: 0 }], { duration: fadeDuration, delay: cleanupTime + 2000, fill: 'forwards' });
            outlinesLayer.animate([{ opacity: 1 }, { opacity: 0 }], { duration: fadeDuration, delay: cleanupTime + 3000, fill: 'forwards' });
            
            // FADE OUT THE FINAL GLOW
            document.getElementById('logo-glow-wrapper').animate([
                { opacity: 1 }, { opacity: 0 }
            ], { duration: fadeDuration, delay: cleanupTime + CONFIG.glowFadeDelay, fill: 'forwards' });
            
        });
    </script>
</body>
</html>
