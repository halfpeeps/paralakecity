<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="bjevHpP5Qc-g1TjDo6F0PUbD0nyB646EqcNfrxjrxjs" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paralake V6 | Development Archive</title>
    <link rel="stylesheet" type="text/css" href="css/styles.css">
    <link rel="stylesheet" type="text/css" href="css/archive.css">
    <link rel="stylesheet" type="text/css" href="css/splashscreen.css">
    <link rel="icon" type="image/x-icon" href="images_excluded/archive_icon_mono.png">
    <link href="https://fonts.googleapis.com/css2?family=Sono:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Jost:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
    </div>
    
    <div id="mobile-warning">
        <div class="mobile-warning-content">
            <p>This site is not designed to work on mobile devices.</p>
            <button onclick="closeMobileWarning()">Okay</button>
        </div>
    </div>
    
    <!-- SPLASH SCREEN: Disable/Enable in the CSS -->
    <div class="popup-overlay" id="popup">
        <div class="popup-container">
            <button class="popup-close" onclick="closePopup()">&times;</button>
            <div class="popup-image">
                <img src="images_excluded/update2_bazaar.jpg">
            </div>
            <div class="popup-content">
                <div class="popup-header">Paralake V6.2</div>
                <div class="popup-text">
                    The second major update for Paralake V6 is here.
                    New properties, quality of life improvements, visual enhancements
                    and lots more changes.  Check out Paralake V6.2 now!
                    <br>
                    <br>
                    <br>
                </div>
            </div>
            <!-- add the forum post here -->
            <a href="downloads.html"  class="popup-button">Download Now</a>
        </div>
    </div>
    
    <div id="header">
        <span id="header-title" style="line-height: 0.8;">Paralake V6<br><span id="header-subtitle" style="font-size: 22px;">Development Archive</span></span>
        
        <a href="archive.html" style="padding-top: 5px">
            <img src="images_excluded/archive_logo_mono.png" alt="Logo" style="height: 45px; border: 0px"
            onmouseover="this.src='images_excluded/archive_logo.png';"
            onmouseout="this.src='images_excluded/archive_logo_mono.png';">
        </a>

        <div id="header-menu">
            <button class="menu-button-active" onclick="location.href='archive.html'">Development Archive</button>
            <button class="menu-button" onclick="location.href='changelogs.html'">Changelogs</button>
            <button class="menu-button" onclick="location.href='updates.html'">Posts</button>
            <button class="menu-button" onclick="location.href='downloads.html'">Downloads</button>
            <button class="menu-button" onclick="location.href='credits.html'">Map Credits</button>
            <button class="menu-button-map" onclick="location.href='map.html'">Interactive Map</button>
            <button id="theme-toggle">Dark Theme</button>
        </div>
    </div>

    <div id="container">
        <div id="sidebar"></div>
        <div id="image-container"></div>
    </div>

    <!--image popup-->
    <div id="image-preview">
        <span class="close">&times;</span>
        <div class="preview-content">
            <a id="preview-link" hreg="" target="_blank">
                <img id="preview-img" src="" alt="Image">
            </a>
        </div>
    </div>

    <div id="pagefooter" style="position: sticky; z-index: 9999;"></div>

    <!-- image loading spinner -->
    <div id="image-spinner" style="display: none;">
        <div class="image-spinner"></div>
    </div>
    
    <script>
        // loading screen
        let minLoadingTime = 500; // 1 second minimum
                let startTime = Date.now();

                window.addEventListener("load", function() {
                    let loadingScreen = document.getElementById("loading-screen");
                    let content = document.getElementById("content");

                    let timeElapsed = Date.now() - startTime;
                    let remainingTime = Math.max(0, minLoadingTime - timeElapsed);

                    setTimeout(() => {
                        loadingScreen.classList.add("hidden");

                        setTimeout(() => {
                            loadingScreen.style.display = "none";
                        }, 500);
                    }, remainingTime);
                });
    </script>

    <script src="scripts/mobileWarning.js"></script>
    <script src="scripts/footer.js"></script>
    <script src="scripts/headerMenu.js"></script>
    <script src="scripts/archive.js"></script>
    <script src="scripts/splashscreen.js"></script>

</body>
</html>
