<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paralake City | Changelogs</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/changelogs.css" />
    <link rel="stylesheet" href="css/splashscreenChangelogsArchive.css" />

    <link rel="icon" type="image/x-icon" href="images_excluded/archive_icon_mono.png" />
    <link href="https://fonts.googleapis.com/css2?family=Sono:wght@200..800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Jost:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
    </div>
    
    <div id="mobile-warning">
        <div class="mobile-warning-content">
            <p>This site is not designed to work on mobile devices.</p>
            <button onclick="closeMobileWarning()">Okay</button>
        </div>
    </div>

    <div id="header">
        <span id="header-title" style="line-height: 0.8; cursor: pointer;" onclick="location.href='index.html'">Paralake City</span>

        <div id="header-nav">
            <button class="menu-button"          onclick="location.href='archive.html'">Development Archive</button>
            <button class="menu-button-active"   onclick="location.href='changelogs.html'">Changelogs</button>
            <button class="menu-button"          onclick="location.href='downloads.html'">Downloads</button>
            <button class="menu-button"          onclick="location.href='credits.html'">Map Credits</button>
            <button class="menu-button-map"      onclick="location.href='map.html'">Interactive Map</button>
            <!-- <button id="theme-toggle">Dark Theme</button> -->
        </div>
    </div>

    <div id="container">
        <div id="sidebar">
            <div id="timeline-line"></div>
        </div>

        <div id="changelog-container">
            <div id="changelog-content-wrapper">
            </div>
        </div>
    </div>

    <div id="loading" style="display: flex;">
        <div class="loading"></div>
    </div>

    <div id="pagefooter" style="position: sticky; z-index: 9999;"></div>

    <script>
        // loading screen
        let minLoadingTime = 500; // 1 second minimum
        let startTime = Date.now();

        window.addEventListener("load", function() {
            let loadingScreen = document.getElementById("loading-screen");

            let timeElapsed = Date.now() - startTime;
            let remainingTime = Math.max(0, minLoadingTime - timeElapsed);

            setTimeout(() => {
                if (loadingScreen) {
                    loadingScreen.classList.add("hidden");
                    setTimeout(() => {
                        loadingScreen.style.display = "none";
                    }, 500);
                }
            }, remainingTime);
        });
    </script>
    <script src="scripts/mobileWarning.js"></script>
    <script src="scripts/changelogs.js"></script>
    <script src="scripts/footer.js"></script>
    <!-- <script src="scripts/headerMenu.js"></script> -->
    <script src="scripts/splashscreen.js"></script>
</body>
</html>
